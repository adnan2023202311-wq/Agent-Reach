[tool.mypy]
python_version = "3.11"
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
strict_equality = true
# Enforced first on the layers with the strongest guarantees to keep;
# widen to the rest of the tree as agents/infrastructure mature past
# stub implementations.
files = ["domain", "core", "composition.py", "config", "api"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]  # line length handled by formatting, not linting

[tool.ruff.lint.isort]
known-first-party = ["domain", "core", "agents", "infrastructure", "api", "config", "composition"]
