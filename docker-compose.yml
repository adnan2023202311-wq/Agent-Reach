version: "3.9"

services:
  api:
    build: .
    container_name: agent-reach-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:8080
    volumes:
      - ./plugins:/app/plugins:ro
      - agent_reach_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: node:20-alpine
    container_name: agent-reach-frontend
    working_dir: /app
    volumes:
      - ./frontend/Agent\ Canvas:/app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_API_MODE=http
    command: sh -c "npm install -g bun && bun install && bun run dev --host 0.0.0.0 --port 3000"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: agent-reach-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    profiles: ["prod"]

volumes:
  agent_reach_data:
